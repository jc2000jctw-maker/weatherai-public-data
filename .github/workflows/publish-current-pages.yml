name: Publish Current WeatherAI Data

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: weatherai-current-pages
  cancel-in-progress: true

jobs:
  publish-current:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}weatherai-data/manifest.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate current WeatherAI data bundle
        run: |
          python3 tools/validate_weather_data_bundle.py \
            --bundle-dir public/weatherai-data \
            --min-entry-samples 48 \
            --min-climate-source-successes 2
          python3 tools/test_weather_data_integrity.py \
            --bundle-dir public/weatherai-data

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy current WeatherAI data to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed WeatherAI manifest
        run: |
          python3 tools/verify_release_weather_config.py \
            --manifest-url "${{ steps.deployment.outputs.page_url }}weatherai-data/manifest.json" \
            --request-timeout 30 \
            --retry-count 5 \
            --retry-backoff-seconds 6

